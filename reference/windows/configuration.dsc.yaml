# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# Reference: https://github.com/microsoft/winget-cli#building-the-client
#
# Usage: winget configure -f configuration.dsc.yaml
#
# Note: Tool versions (Go, Node, Terraform, etc.) are managed by mise.
# DSC installs them as a baseline; mise overrides with pinned versions.
# As mise on Windows stabilizes, these can be gradually removed from DSC.
# Candidates for removal: GoLang.Go, OpenJS.NodeJS, Hashicorp.Terraform
# Keep in DSC: GUI apps, mise-incompatible tools, OS settings (DeveloperMode)
properties:
  resources:
    - resource: Microsoft.Windows.Developer/DeveloperMode
      directives:
        description: "Enable Developer Mode"
        allowPrerelease: true
      settings:
        Ensure: Present
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install PowerShell"
        allowPrerelease: false
      settings:
        id: Microsoft.PowerShell
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install GitHub CLI"
        allowPrerelease: false
      settings:
        id: GitHub.cli
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Go"
        allowPrerelease: false
      settings:
        id: GoLang.Go
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install fzf"
        allowPrerelease: false
      settings:
        id: junegunn.fzf
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install git"
        allowPrerelease: false
      settings:
        id: Git.Git
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Azure CLI"
        allowPrerelease: false
      settings:
        id: Microsoft.AzureCLI
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install PowerToys"
        allowPrerelease: false
      settings:
        id: Microsoft.PowerToys
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install DevToys"
        allowPrerelease: true
      settings:
        id: DevToys-app.DevToys
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install DotNet SDK"
        allowPrerelease: false
      settings:
        id: Microsoft.DotNet.SDK.9
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Azure Developer CLI"
        allowPrerelease: false
      settings:
        id: microsoft.azd
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install jq"
        allowPrerelease: false
      settings:
        id: jqlang.jq
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install node"
        allowPrerelease: false
      settings:
        id: OpenJS.NodeJS
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Terraform"
        allowPrerelease: false
      settings:
        id: Hashicorp.Terraform
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Dev Proxy"
        allowPrerelease: false
      settings:
        id: DevProxy.DevProxy
        source: winget
    # Python is managed by uv — no system Python install needed
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install uv"
        allowPrerelease: false
      settings:
        id: astral-sh.uv
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install mise"
        allowPrerelease: false
      settings:
        id: jdx.mise
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install GitHub Copilot CLI"
        allowPrerelease: true
      settings:
        id: GitHub.Copilot
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Microsoft Edit"
        allowPrerelease: false
      settings:
        id: Microsoft.Edit
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install draw.io"
        allowPrerelease: false
      settings:
        id: JGraph.Draw
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install zoxide"
        allowPrerelease: false
      settings:
        id: ajeetdsouza.zoxide
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install ghq"
        allowPrerelease: false
      settings:
        id: x-motemen.ghq
        source: winget
  configurationVersion: 0.2.0
