# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# Reference: https://github.com/microsoft/winget-cli#building-the-client
#
# Usage: winget configure -f configuration.dsc.yaml (管理者権限の PowerShell で実行)
#
# Note: Most CLI tool versions are managed by mise (~/.config/mise/config.toml).
# DSC contains only: OS settings, GUI/CLI apps not managed by mise, and
# bootstrap tooling (mise itself).
properties:
  resources:
    - resource: Microsoft.Windows.Developer/DeveloperMode
      directives:
        description: "Enable Developer Mode"
        allowPrerelease: true
      settings:
        Ensure: Present
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install PowerShell"
        allowPrerelease: false
      settings:
        id: Microsoft.PowerShell
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install git"
        allowPrerelease: false
      settings:
        id: Git.Git
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install PowerToys"
        allowPrerelease: false
      settings:
        id: Microsoft.PowerToys
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install DevToys"
        allowPrerelease: true
      settings:
        id: DevToys-app.DevToys
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install GitHub CLI"
        allowPrerelease: false
      settings:
        id: GitHub.cli
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install GitHub Copilot CLI"
        allowPrerelease: false
      settings:
        id: GitHub.Copilot
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install GitHub Copilot app"
        allowPrerelease: false
      settings:
        id: GitHub.CopilotApp
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Azure Developer CLI"
        allowPrerelease: false
      settings:
        id: Microsoft.Azd
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install mise"
        allowPrerelease: false
      settings:
        id: jdx.mise
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        # rust-toolchain.toml を持つプロジェクトでの version pinning を機能させるため、
        # mise ではなく公式インストーラー (rustup) で管理する。
        # 詳細: docs/adr/016-rust-external-rustup.md
        description: "Install Rust (rustup)"
        allowPrerelease: false
      settings:
        id: Rustlang.Rustup
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: VisualStudioBuildTools
      directives:
        # cargo/rustc の windows-msvc ターゲットビルドに必要な MSVC リンカー (link.exe) を導入する。
        # C++ ワークロードはインストーラー引数が必要なため WinGetPackage 単体では指定できず、
        # 下の VSComponents リソースで別途追加する。
        # link.exe が Coreutils for Windows 版と名前衝突する問題への対応は docs/adr/017-msvc-linker-env-var-override-windows.md
        description: "Install Visual Studio 2022 Build Tools"
        allowPrerelease: false
        securityContext: elevated
      settings:
        id: Microsoft.VisualStudio.2022.BuildTools
        source: winget
    - resource: Microsoft.VisualStudio.DSC/VSComponents
      dependsOn:
        - VisualStudioBuildTools
      directives:
        description: "Install C++ build tools workload (Desktop development with C++) + Windows SDK"
        securityContext: elevated
      settings:
        productId: Microsoft.VisualStudio.Product.BuildTools
        channelId: VisualStudio.17.Release
        components: Microsoft.VisualStudio.Workload.VCTools
        includeRecommended: true
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Microsoft Edit"
        allowPrerelease: false
      settings:
        id: Microsoft.Edit
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        # 同梱の link.exe (ハードリンク作成コマンド) が MSVC リンカーと名前衝突する。
        # 対応: docs/adr/017-msvc-linker-env-var-override-windows.md
        description: "Install Coreutils for Windows"
        allowPrerelease: false
      settings:
        id: Microsoft.Coreutils
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Azure CLI"
        allowPrerelease: false
      settings:
        id: Microsoft.AzureCLI
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install LibreOffice"
        allowPrerelease: false
      settings:
        id: TheDocumentFoundation.LibreOffice
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install Poppler"
        allowPrerelease: false
      settings:
        id: oschwartz10612.Poppler
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: "Install draw.io"
        allowPrerelease: false
      settings:
        id: JGraph.Draw
        source: winget
  configurationVersion: 0.2.0
